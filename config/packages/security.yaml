# config/packages/security.yaml
security:
    # enable_authenticator_manager: true # Supprimé si Symfony < 5.1

    password_hashers:
        App\Entity\User: { algorithm: auto }

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email # Ou la propriété que vous utilisez pour le login (ex: username)

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        login_api: # Pour votre API React
            pattern:   ^/api/login$
            stateless: true
            # Si Symfony < 5.1, vous utiliserez 'guard' ici, sinon 'json_login'
            # Exemple avec json_login (Symfony 5.1+)
            json_login:
                check_path:        /api/login # Ou un autre nom comme /api/login_check
                username_path:     email
                password_path:     password
                success_handler:   lexik_jwt_authentication.handler.authentication_success
                failure_handler:   lexik_jwt_authentication.handler.authentication_failure
            # Exemple avec guard (Symfony < 5.1)
            # guard:
            #    authenticators:
            #        - App\Security\ApiLoginAuthenticator #
# config/packages/security.yaml
security:

  providers:
    app_user_provider:
      entity:
        class: App\Entity\User
        property: email
        
  firewalls:
    dev:
      pattern:   ^/(_(profiler|wdt)|css|images|js)/
      security: false

    api:
      pattern:   ^/api
      security: false    # ← Tous les endpoints /api sont hors sécurité

    main:
      pattern: ^/
      provider: app_user_provider
      form_login:
        login_path:  /login
        check_path:  /login
      logout: true

  # plus aucune access_control nécessaire si tout doit être public
  access_control: []
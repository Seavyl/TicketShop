# config/services.yaml
services:
  # ← assurez-vous d’avoir déjà un _defaults_ avec autowire/autoconfigure
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  # Votre extension pour filtrer les Order par utilisateur courant
  App\:
    resource: '../src/*'
    exclude:
      - '../src/{DependencyInjection,Entity,Migrations,Tests,Kernel.php}'

  # <— ENREGISTREMENT DES REPOSITORIES
  App\Repository\:
    resource: '../src/Repository'
    tags: ['doctrine.repository_service']